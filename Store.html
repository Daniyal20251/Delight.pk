<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="Home.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <title>Delight.pk - Store</title>
</head>
<body>

  <header>
    <h2 id="sellerName">DELIGHT.PK</h2>
    <div class="logo1">
      <img id="sellerLogo" src="Delight icons/lo.png" width="50" height="50" alt="Seller Logo">
    </div>
  </header>
  
  <!-- Search -->
  <div class="search-wrap">
    <input type="text" id="searchInput" class="search" placeholder="🔍 Search...">
    <button onclick="searchItems()" class="btn">Search</button>
  </div>

  <!-- Recent Search Panel -->
  <div id="searchPanel" class="search-panel">
    <div class="panel-header">
      <p class="recent-title">Recent Searches</p>
      <button id="clearHistoryBtn" class="clear-btn">Clear</button>
    </div>
    <ul id="recentSearches"></ul>

    <div class="suggestions">
      <span onclick="fillAndSearch('Tripod')">Tripod Stand</span>
      <span onclick="fillAndSearch('Wall Clock')">Wall Clock</span>
      <span onclick="fillAndSearch('Gripper')">Gripper</span>
      <span onclick="fillAndSearch('Smart Watch')">Smart Watch</span>
    </div>
  </div>

  <div style="margin-bottom:74px;"></div>

  <!-- Swiper Slider (Ads) - 8 Ads with Fixed IDs -->
  <div class="swiper mySwiper" id="adSlider">
    <div class="swiper-wrapper" id="swiperWrapper">
      <!-- Ad 1 - Store Name Filter -->
      <div class="swiper-slide" id="ad1">
        <img src="" alt="Ad 1" loading="lazy">
      </div>
      <!-- Ad 2 - Delight.pk1 -->
      <div class="swiper-slide" id="ad2">
        <img src="" alt="Ad 2" loading="lazy">
      </div>
      <!-- Ad 3 - Delight.pk2 -->
      <div class="swiper-slide" id="ad3">
        <img src="" alt="Ad 3" loading="lazy">
      </div>
      <!-- Ad 4 - Delight.pk3 -->
      <div class="swiper-slide" id="ad4">
        <img src="" alt="Ad 4" loading="lazy">
      </div>
      <!-- Ad 5 - Delight.pk4 -->
      <div class="swiper-slide" id="ad5">
        <img src="" alt="Ad 5" loading="lazy">
      </div>
      <!-- Ad 6 - Delight.pk5 -->
      <div class="swiper-slide" id="ad6">
        <img src="" alt="Ad 6" loading="lazy">
      </div>
      <!-- Ad 7 - Delight.pk6 -->
      <div class="swiper-slide" id="ad7">
        <img src="" alt="Ad 7" loading="lazy">
      </div>
      <!-- Ad 8 - Delight.pk7 -->
      <div class="swiper-slide" id="ad8">
        <img src="" alt="Ad 8" loading="lazy">
      </div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <!-- Skeleton Loading -->
  <div id="skeletonContainer" class="skeleton-container">
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
  </div>

  <div id="itemContainer" class="container" style="display:none;"></div>
  
  <!-- Bottom Navigation Bar -->
  <div class="bar">
    <a href="#" id="homeLink"><img src="Delight icons/Home.png" width="25" height="25"><br>Home</a>
    <a href="#" id="categoriesLink"><img src="Delight icons/Categories.png" width="25" height="25"><br>Categories</a>
    <a href="#" id="cartLink"><img src="Delight icons/Cart.png" width="25" height="25"><br>Cart</a>
    <a href="#" id="profileLink"><img src="Delight icons/Profile.png" width="25" height="25"><br>Profile</a>
  </div>
  
  <script src="Store.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  
  <!-- Navigation Fix -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sellerPhone = urlParams.get("phone");
      
      if (sellerPhone) {
        document.getElementById("homeLink").href = `Store.html?phone=${sellerPhone}`;
        document.getElementById("categoriesLink").href = `Categories Stores.html?phone=${sellerPhone}`;
        document.getElementById("cartLink").href = `Cart Stores.html?phone=${sellerPhone}`;
        document.getElementById("profileLink").href = `Profile Stores.html?phone=${sellerPhone}`;
      }
    });
  </script>
  
</body>
</html>
