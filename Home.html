<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO Title -->
  <title>Delight.pk - Online Shopping Store Pakistan</title>

  <!-- SEO Description -->
  <meta name="description" content="Delight.pk Pakistan ka online shopping store hai jahan aap asani se products khareed aur bech sakte hain." />

  <!-- Favicon (logo small icon) -->
  <link rel="icon" href="logo.png" type="image/png" />

  <!-- CSS -->
  <link rel="stylesheet" href="Home.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Open Graph (Facebook / WhatsApp preview) -->
  <meta property="og:title" content="Delight.pk - Online Shopping Store Pakistan">
  <meta property="og:description" content="Best online shopping platform in Pakistan">
  <meta property="og:image" content="https://delightpk.qzz.io/logo.png">
  <meta property="og:url" content="https://delightpk.qzz.io/">

  <!-- Structured Data (Google logo + name) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Delight.pk",
    "url": "https://delightpk.qzz.io/",
    "logo": "https://delightpk.qzz.io/logo.png"
  }
  </script>
</head>
<body>
 
  <header>
    <h2>DELIGHT.PK</h2>
    <div class="logo">
      <img src="Delight icons/lo.png" width="40" height="30" alt="logo">
    </div>
  </header>
  
  <div style="margin-bottom:57px;"></div>

  <!-- 🔹 All items | Shops Tab Bar -->
  <div class="tab-bar">
    <div class="tab active" onclick="setActiveTab(this, 'Home.html')">All items</div>
    <div class="tab" onclick="setActiveTab(this, 'Delightstore.html')">Shops</div>
    <div class="underline"></div>
  </div>

  <!-- 🔹 Bottom Navigation Bar -->
  <div class="bar">
    <a href="Home.html" class="active"><img src="Delight icons/Home.png" width="25" height="25"><br>Home</a>
    <a href="Categories.html"><img src="Delight icons/Categories.png" width="25" height="25"><br>Categories</a>
    <a href="cart.html"><img src="Delight icons/Cart.png" width="25" height="25"><br>Cart</a>
    <a href="profile.html"><img src="Delight icons/Profile.png" width="25" height="25"><br>Profile</a>
  </div>

  <!-- 🔹 Ads Loading Skeleton (Pehle yeh dikhega) -->
  <div id="adsSkeleton" class="ads-skeleton">
    <div class="skeleton-ad"></div>
  </div>

  <!-- 🔹 Swiper Slider (Ads) - Slider ID = adSlider, Slides ID = ad1 to ad8 -->
  <div class="swiper mySwiper" id="adSlider" style="display:none;">
    <div class="swiper-wrapper" id="swiperWrapper">
      <!-- Ad 1 - Delight.pk -->
      <div class="swiper-slide" id="ad1">
        <img src="" alt="Ad 1" loading="lazy">
      </div>
      <!-- Ad 2 - Delight.pk1 -->
      <div class="swiper-slide" id="ad2">
        <img src="" alt="Ad 2" loading="lazy">
      </div>
      <!-- Ad 3 - Delight.pk2 -->
      <div class="swiper-slide" id="ad3">
        <img src="" alt="Ad 3" loading="lazy">
      </div>
      <!-- Ad 4 - Delight.pk3 -->
      <div class="swiper-slide" id="ad4">
        <img src="" alt="Ad 4" loading="lazy">
      </div>
      <!-- Ad 5 - Delight.pk4 -->
      <div class="swiper-slide" id="ad5">
        <img src="" alt="Ad 5" loading="lazy">
      </div>
      <!-- Ad 6 - Delight.pk5 -->
      <div class="swiper-slide" id="ad6">
        <img src="" alt="Ad 6" loading="lazy">
      </div>
      <!-- Ad 7 - Delight.pk6 -->
      <div class="swiper-slide" id="ad7">
        <img src="" alt="Ad 7" loading="lazy">
      </div>
      <!-- Ad 8 - Delight.pk7 -->
      <div class="swiper-slide" id="ad8">
        <img src="" alt="Ad 8" loading="lazy">
      </div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <!-- 🔹 Flash Sale Section -->
  <div class="flash-sale-section" id="flashSaleBox" style="display:none;">
    <div class="flash-sale-heading">🔥 Flash Sale</div>
    <div id="flashSaleContainer" class="flash-sale-grid"></div>
  </div>

  <!-- 🔹 Search Section -->
  <div class="search-wrap">
    <input type="text" id="searchInput" class="search" placeholder="🔍 Search...">
    <button onclick="searchItems()" class="btn">Search</button>
  </div>

  <!-- 🔹 Recent Searches Panel -->
  <div id="searchPanel" class="search-panel">
    <div class="panel-header">
      <p class="recent-title">Recent Searches</p>
      <button id="clearHistoryBtn" class="clear-btn">Clear</button>
    </div>
    <ul id="recentSearches"></ul>

    <div class="suggestions">
      <span onclick="fillAndSearch('Tripod')">Tripod Stand</span>
      <span onclick="fillAndSearch('Wall Clock')">Wall Clock</span>
      <span onclick="fillAndSearch('Gripper')">Gripper</span>
      <span onclick="fillAndSearch('Smart Watch')">Smart Watch</span>
    </div>
  </div>

  <!-- 🔹 Skeleton Loading (Products ke liye) -->
  <div id="skeletonContainer" class="skeleton-container">
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-price"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-price"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-price"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-price"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-price"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-price"></div>
    </div>
  </div>

  <!-- 🔹 Product Container -->
  <div id="itemContainer" class="container" style="display:none;"></div>

  <!-- 🔹 Scripts -->
  <script src="Home.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

</body>
</html>
